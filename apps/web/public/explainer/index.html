<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Rico — Launch Film</title>
<meta name="description" content="Rico — UAE AI career companion. A cinematic launch film.">
<style>
  html,body{margin:0;height:100%;background:#070709;color:#C9A84C;
    font-family:"Instrument Serif",Georgia,serif}
  .load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:1.4rem;letter-spacing:.02em;opacity:.7}
  .load span{animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
  a{color:#C9A84C}
</style>
<script>
(function (win) {
  "use strict";
  /* Owner directive 2026-07-16: the three approved films rotate as a
     randomized non-repeating cycle — every film plays once before any film
     repeats. The shuffled deck persists in localStorage so the cycle spans
     visits, sessions and reloads.

     Absolute paths because Vercel may serve /explainer without a trailing
     slash; relative paths would then resolve to /option-*.html and 404. */
  var FILMS = [
    '/explainer/option-2.html',
    '/explainer/option-3.html',
    '/explainer/option-3b.html'
  ];
  var DECK_KEY = 'rico-film-deck-v1';
  var LAST_KEY = 'rico-film-last-v1';

  function shuffle(list, random) {
    var a = list.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  /* A legitimate persisted deck is a remainder of one shuffled cycle: only
     approved films, no duplicates, never longer than the cycle. Anything
     else (retired films, duplicate entries, wrong types) is corrupt and is
     rebuilt wholesale — a duplicate entry would otherwise replay the same
     film twice in a row, breaking the non-repeating guarantee. */
  function isValidDeck(parsed) {
    if (!Array.isArray(parsed) || parsed.length > FILMS.length) { return false; }
    for (var i = 0; i < parsed.length; i++) {
      if (FILMS.indexOf(parsed[i]) === -1) { return false; }
      if (parsed.indexOf(parsed[i]) !== i) { return false; }
    }
    return true;
  }

  /* Draw the next film from the persisted deck; reshuffle when exhausted.
     A fresh deck never opens with the film that closed the previous cycle,
     so an immediate reload never replays the same film back-to-back.
     Storage failures (privacy modes) degrade to a plain random pick. */
  function nextFilm(storage, random) {
    var deck = [];
    var last = null;
    try {
      last = storage.getItem(LAST_KEY);
      var parsed = JSON.parse(storage.getItem(DECK_KEY) || '[]');
      if (isValidDeck(parsed)) { deck = parsed; }
    } catch (e) { /* corrupted or unavailable storage → fresh deck */ }

    if (!deck.length) {
      deck = shuffle(FILMS, random);
      if (deck.length > 1 && deck[0] === last) {
        deck.push(deck.shift());
      }
    }
    var pick = deck.shift();
    try {
      storage.setItem(DECK_KEY, JSON.stringify(deck));
      storage.setItem(LAST_KEY, pick);
    } catch (e) { /* pick still plays; the next visit reshuffles */ }
    return pick;
  }

  /* Render the chosen film in place: the address bar stays on the chooser,
     so reloading or revisiting re-enters the rotation instead of staying
     locked to the previously selected option URL. The films are fully
     self-contained (inline CSS/JS, absolute CTA URLs, clip paths relative
     to /explainer/), so swapping the document body is safe. Falls back to
     a hard redirect if fetch is unavailable or the film fails to load. */
  function showFilm(w, url) {
    function hardNav() {
      w.location.replace(url + w.location.search + w.location.hash);
    }
    if (typeof w.fetch !== 'function') { hardNav(); return; }
    w.fetch(url, { credentials: 'same-origin' })
      .then(function (res) {
        if (!res.ok) { throw new Error('HTTP ' + res.status); }
        return res.text();
      })
      .then(function (html) {
        var doc = w.document;
        doc.open();
        doc.write(html);
        doc.close();
      })
      .catch(hardNav);
  }

  /* Exposed for the vitest regression suite (explainer-film-rotation);
     harmless in production. */
  win.__ricoFilmChooser = { FILMS: FILMS, isValidDeck: isValidDeck, nextFilm: nextFilm, showFilm: showFilm };

  if (!win.document) { return; } /* test harness — exports only, no boot */

  var storage = null;
  try { storage = win.localStorage; } catch (e) { /* privacy mode */ }
  showFilm(win, nextFilm(storage, Math.random));
})(window);
</script>
</head>
<body>
  <div class="load"><span>Rico</span></div>
  <noscript>
    <div class="load" style="flex-direction:column;gap:1rem">
      <div>Rico — Launch Film</div>
      <div style="font-size:1rem">
        <a href="/explainer/option-2.html">Cut 1</a> ·
        <a href="/explainer/option-3.html">Cut 2</a> ·
        <a href="/explainer/option-3b.html">Cut 3</a> ·
        <a href="/explainer/choose.html">Choose</a>
      </div>
    </div>
  </noscript>
</body>
</html>
