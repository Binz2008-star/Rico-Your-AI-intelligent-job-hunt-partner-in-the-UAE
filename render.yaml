services:
  - type: web
    name: rico-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # --proxy-headers + --forwarded-allow-ips lets uvicorn trust Render's load balancer
    # and populate request.client.host from X-Forwarded-For (real client IP), so per-client
    # rate limiting and request logging don't collapse onto the proxy's single IP.
    # '127.0.0.1' trusts only Render's internal proxy — prevents IP spoofing for rate-limit bypass.
    startCommand: python -m uvicorn src.api.app:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='127.0.0.1'
    healthCheckPath: /health
    envVars:

      # ── Auth / admin (secrets — set in Render dashboard) ─────────────────────
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOW_ENV_AUTH_FALLBACK
        value: "false"

      # ── Database ──────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── Email / SMTP (secrets) ────────────────────────────────────────────────
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: ENABLE_SIGNUP_EMAIL_NOTIFICATIONS
        value: "true"
      - key: ADMIN_SIGNUP_NOTIFICATION_EMAIL
        value: "info@ricohunt.com"

      # ── Public contact addresses ──────────────────────────────────────────────
      - key: APP_PUBLIC_EMAIL
        value: "info@ricohunt.com"
      - key: SUPPORT_EMAIL
        value: "info@ricohunt.com"

      # ── Telegram (secrets) ────────────────────────────────────────────────────
      # User-facing bot/chat — job & career notifications only.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      # Admin/dev channel — technical alerts only (CI, deploy, errors, provider
      # quota). Never falls back to TELEGRAM_CHAT_ID; dropped+logged if unset.
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: TELEGRAM_DEV_CHAT_ID
        sync: false
      - key: TELEGRAM_ADMIN_BOT_TOKEN
        sync: false

      # ── AI providers (secrets) ────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_API_TOKEN
        sync: false

      # ── AI provider routing (config) ──────────────────────────────────────────
      - key: RICO_AI_PROVIDER
        value: "deepseek"
      - key: RICO_OPENAI_MODEL
        value: "gpt-4.1-mini"
      - key: DEEPSEEK_MODEL
        value: "deepseek-v4-flash"

      # ── Jotform (secrets) ─────────────────────────────────────────────────────
      - key: JOTFORM_FORM_ID
        sync: false
      - key: JOTFORM_RICO_FORM_ID
        sync: false
      - key: JOTFORM_API_KEY
        sync: false
      - key: JOTFORM_WEBHOOK_SECRET
        sync: false

      # ── GitHub webhook (secret) ───────────────────────────────────────────────
      - key: GITHUB_WEBHOOK_SECRET
        sync: false

      # ── Billing mode ─────────────────────────────────────────────────────────
      # Manual (WhatsApp-assisted) is the safe default. Paddle is activated only
      # by the owner setting BILLING_MODE=paddle in the Render dashboard — never
      # here. See DEC-20260713-005 + AI_WORKSPACE/HANDOFFS/paddle_billing_setup_rollback.md.
      - key: BILLING_MODE
        value: "manual"

      # ── Paddle Billing (single plan: Rico Monthly, USD 21.50/mo) ─────────────
      # Declaration hygiene only — real values live in the Render dashboard, never
      # in this file. Secrets and the environment-specific Price ID use sync:false
      # so the owner sets them per environment. Stripe/AED/Premium config is retired.
      - key: RICO_PRO_PRICE_USD
        value: "21.50"
      # Fail-safe to sandbox; owner flips to false only when activating live billing.
      - key: PADDLE_SANDBOX
        value: "true"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_PRO_MONTHLY_PRICE_ID
        sync: false

      # ── Job search API (secret) ───────────────────────────────────────────────
      - key: RAPIDAPI_KEY
        sync: false

      # ── Environment / URLs ────────────────────────────────────────────────────
      - key: RICO_ENV
        value: "production"
      - key: APP_ENV
        value: "production"
      - key: FRONTEND_URL
        value: "https://ricohunt.com"
      - key: APP_URL
        value: "https://ricohunt.com"
      - key: RESET_BASE_URL
        value: "https://ricohunt.com"
      # ── Cookies / CORS ────────────────────────────────────────────────────────
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: ".ricohunt.com"
      - key: CORS_ORIGINS
        value: "https://ricohunt.com,https://www.ricohunt.com,http://localhost:3000"
      - key: JWT_TTL_HOURS
        value: "24"
      # Trusted reverse-proxy hops for X-Forwarded-For parsing (rate-limit client
      # IP). Render fronts the app with a single edge proxy → "1". Increase only if
      # additional trusted proxies are placed in front. See src/api/rate_limit.py.
      - key: RICO_TRUSTED_PROXY_HOPS
        value: "1"

      # ── Safety / automation gates ─────────────────────────────────────────────
      - key: RICO_ENABLE_AUTO_APPLY
        value: "false"
      - key: RICO_INTERACTIVE_APPLY
        value: "false"
      - key: RICO_REQUIRE_APPROVAL_FOR_APPLICATIONS
        value: "true"
      - key: RICO_TELEGRAM_PUBLIC_ALERTS
        value: "true"
      - key: ALLOW_CI_APPLY
        value: "false"

      # ── Auto-apply config ─────────────────────────────────────────────────────
      - key: AUTO_APPLY_ENABLED
        value: "false"
      - key: AUTO_APPLY_DRY_RUN
        value: "true"
      - key: AUTO_APPLY_MAX_PER_RUN
        value: "3"
      - key: AUTO_APPLY_DAILY_LIMIT
        value: "30"
      - key: AUTO_APPLY_COOLDOWN_SECONDS
        value: "90"
      - key: AUTO_APPLY_SCORE_THRESHOLD
        value: "75"
      - key: AUTO_APPLY_SCORE
        value: "85"
      - key: MANUAL_APPROVAL_SCORE
        value: "65"
      - key: AUTO_APPLY_EXCLUDE_KEYWORDS
        value: "uae national,uae nationals only,uae national only,emirati only,graduate uae national only,quantity surveyor,surveyor,civil engineer,estimator,site engineer,co-founder,owner,founding partner,intern,internship"

      # ── NaukriGulf config ─────────────────────────────────────────────────────
      - key: NG_ENABLED
        value: "true"
      - key: NG_DRY_RUN
        value: "true"
      - key: NG_MAX_PER_RUN
        value: "2"
      - key: NG_DAILY_LIMIT
        value: "5"
      - key: NG_COOLDOWN_SECONDS
        value: "180"
      - key: NG_SCORE_THRESHOLD
        value: "45"
      - key: NG_MAX_SESSION_FAILURES
        value: "3"
      - key: NAUKRIGULF_EXCLUDE_KEYWORDS
        value: "consultancy,pay fee,visa fee,commission only,whatsapp only,recruitment agency,placement agency,manpower supply,walk in interview,uae national,emirati only,quantity surveyor,civil engineer,site engineer,driver,technician"

      # ── Indeed config ─────────────────────────────────────────────────────────
      - key: INDEED_ENABLED
        value: "false"
      - key: INDEED_DRY_RUN
        value: "false"
      - key: INDEED_MAX_PER_RUN
        value: "3"
      - key: INDEED_DAILY_LIMIT
        value: "15"
      - key: INDEED_COOLDOWN_SECONDS
        value: "120"
      - key: INDEED_SCORE_THRESHOLD
        value: "50"
      - key: INDEED_STREET_ADDRESS
        value: "Ajman, UAE"
      - key: INDEED_RELEVANT_JOB_TITLE
        value: "Sustainability & Environmental Operations Leader"
      - key: INDEED_RELEVANT_COMPANY
        value: "ECO Environmental Services"

      # ── Job filtering ─────────────────────────────────────────────────────────
      - key: EXCLUDE_KEYWORDS
        value: "surveyor,purchasing,procurement,interior,joinery,project engineer,hr officer,catering,accommodation,cad supervisor,technician,driver,consultant,recruitment agency,admin officer,secretary,personal assistant,uae national,emirati only,general manager,executive assistant,store manager,sales manager,marketing manager,business development manager"
      - key: CV_PATH
        value: "data/cv.pdf"
      - key: PYTHON_VERSION
        value: "3.11.9"
