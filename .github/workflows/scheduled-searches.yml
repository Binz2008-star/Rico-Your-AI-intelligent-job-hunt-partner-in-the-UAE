name: "Scheduled Search Sweep (manual)"

# #1249 step 5: daily scheduled saved-search sweep (in-app delivery only).
# Step-4 dry run validated the full chain in production (schedule discovered
# and evaluated: HTTP 200 {"status":"ok","searches":1,"users":1,...}), and the
# owner enabled RICO_ENABLE_SCHEDULED_SEARCHES on the backend — the env kill
# switch remains the instant off-lever without touching this file.
#
# Event semantics: scheduled runs carry no inputs, so DRY_RUN is empty and the
# job runs REAL execution (persists results + dedup keys). Manual dispatches
# keep dry_run=true as their default for safe smoke checks.
on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 09:00 UAE, daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Evaluate matching without persisting results"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: scheduled-searches
  cancel-in-progress: false

jobs:
  sweep:
    name: Scheduled Search Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger sweep
        env:
          API_URL: ${{ secrets.RICO_API_URL }}
          CRON_SECRET: ${{ secrets.RICO_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::RICO_API_URL and RICO_CRON_SECRET secrets are required."
            exit 1
          fi
          BASE="${API_URL%/}"
          # Scheduled runs have no inputs (DRY_RUN empty) → real execution.
          # Manual dispatches always carry the input (default "true").
          DRY="${DRY_RUN:-false}"
          echo "Triggering scheduled-searches sweep (dry_run=${DRY})"
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            "${BASE}/api/v1/pipeline/scheduled-searches?dry_run=${DRY}")
          echo "HTTP ${HTTP}"
          cat /tmp/resp.json || true
          echo
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Sweep failed with HTTP ${HTTP}"
            exit 1
          fi
