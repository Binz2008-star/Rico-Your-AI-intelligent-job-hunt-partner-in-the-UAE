name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy & Verify Production
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Render deploy propagation
        run: sleep 30

      - name: Verify backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rico-job-automation-api.onrender.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Backend health: OK ($STATUS)"
          curl -s https://rico-job-automation-api.onrender.com/health | python3 -m json.tool

      - name: Verify frontend reachability
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ricohunt.com)
          if [ "$STATUS" != "200" ]; then
            echo "Frontend check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Frontend: OK ($STATUS)"

      - name: Verify proxy pass-through
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ricohunt.com/proxy/health)
          if [ "$STATUS" != "200" ]; then
            echo "Proxy pass-through failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Proxy: OK ($STATUS)"
