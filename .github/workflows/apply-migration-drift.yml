name: Apply Migration Drift (712)

# One-time, manual remediation for the #712 drift (005 pipeline objects + 011
# recommendation indexes). Manual dispatch only, and the script refuses to run
# unless the confirm phrase is provided. Only applies the specific idempotent
# objects in scripts/apply_migration_drift.py — re-running is a no-op.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY-712 to confirm applying 005/011 to production'
        required: true
        default: ""

concurrency:
  group: apply-migration-drift
  cancel-in-progress: false

jobs:
  apply:
    name: Apply 005/011 to production (gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Apply migration drift
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY_CONFIRM: ${{ github.event.inputs.confirm }}
        run: python scripts/apply_migration_drift.py

      - name: Re-run drift check (verify zero drift)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/check_migration_drift.py
