# Hides noisy bot comments in issues and pull requests.
# The issue_comment trigger covers PR comments and issue comments.
# pull_request_review_comment covers review comments on code lines.
# workflow_dispatch allows manual re-runs for a specific issue/PR.
name: Hide bot comments

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number to process (manual runs only)'
        required: false
        default: ''
      review_comment:
        description: 'Set to true if this is a PR review comment (manual runs only)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.issue_number || github.run_id }}
  cancel-in-progress: false

env:
  # Bot usernames whose comments should be minimized. Keep sorted alphabetically.
  # If the list of noisy bots changes, update both BOT_USERS and the matrix below.
  BOT_USERS: |
    github-actions[bot]
    vercel[bot]
    continue[bot]
    netlify-optimizer[bot]

jobs:
  # Use kanga333/comment-hider to minimize all comments from each bot.
  # The action only supports one username per invocation, so we use a matrix.
  # Pinned to v0.4.0 (sha256: c12bb20b48aeb8fc098e35967de8d4f8018fffdf)
  hide-issue-pr-comments:
    if: github.event_name == 'issue_comment' || (github.event_name == 'workflow_dispatch' && github.event.inputs.review_comment != 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        bot:
          - github-actions[bot]
          - vercel[bot]
          - continue[bot]
          - netlify-optimizer[bot]
    steps:
      - name: Minimize comments from ${{ matrix.bot }}
        uses: kanga333/comment-hider@c12bb20b48aeb8fc098e35967de8d4f8018fffdf
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          hide_user_name: ${{ matrix.bot }}
          hide_reason: OUTDATED
          leave_visible: 0
          issue_number: ${{ github.event.inputs.issue_number || '' }}

  # kanga333/comment-hider does not support review comments, so we use
  # github-script to minimize the individual comment when a bot posts it.
  # Pinned to v7.0.0 (sha256: f28e40c7f34bde8b3046d885e986cb6290c5673b)
  hide-review-comment:
    if: github.event_name == 'pull_request_review_comment' || (github.event_name == 'workflow_dispatch' && github.event.inputs.review_comment == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Minimize bot review comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const botUsers = new Set([
              'github-actions[bot]',
              'vercel[bot]',
              'continue[bot]',
              'netlify-optimizer[bot]'
            ]);

            const author = context.payload.comment?.user?.login;
            if (!author || !botUsers.has(author)) {
              core.info(`Comment author '${author}' is not in the bot list; nothing to hide.`);
              return;
            }

            const nodeId = context.payload.comment.node_id;
            if (!nodeId) {
              core.warning('No node_id found on review comment; cannot minimize.');
              return;
            }

            await github.graphql(
              `mutation($subjectId: ID!) {
                minimizeComment(input: { classifier: OUTDATED, subjectId: $subjectId }) {
                  minimizedComment { isMinimized }
                }
              }`,
              { subjectId: nodeId }
            );
            core.info(`Minimized review comment from ${author}.`);
