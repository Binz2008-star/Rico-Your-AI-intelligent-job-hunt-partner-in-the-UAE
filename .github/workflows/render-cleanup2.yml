name: Render Cleanup 2 -- explicit-allowlist mutation

# #1084: the ONLY workflow allowed to mutate Render, rebuilt fail-closed:
#   * credential comes ONLY from the environment-scoped RENDER_API_KEY secret
#     (no dispatch input) and the job refuses to run without it
#   * runs inside the protected `production` environment (required-reviewer
#     approval boundary — configure reviewers in repo Settings → Environments)
#   * deletion targets are an EXPLICIT service-id allowlist, confirmed twice
#     (the confirmation input must repeat the exact id list), validated by
#     scripts/render_cleanup_guard.py against the LIVE service list, and the
#     validation re-runs immediately before mutation so a stale/changed set
#     refuses the run
#   * a renamed/missing production service makes the guard refuse everything —
#     production can never fall through into a deletion set
#   * dry_run defaults to 'true'; no authenticated response body is ever
#     printed (status codes only)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = validate and preview only, false = execute'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_service_ids:
        description: 'EXPLICIT comma-separated Render service ids to DELETE (srv-...). Leave empty for no deletions.'
        required: false
        default: ''
      confirm_service_ids:
        description: 'Repeat the SAME id list to confirm — the confirmation is bound to the exact target set.'
        required: false
        default: ''
      disable_pr_previews:
        description: 'yes = PATCH production to disable PR previews (requires dry_run=false)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

permissions:
  contents: read

concurrency:
  group: render-mutation
  cancel-in-progress: false

jobs:
  cleanup:
    name: Render Cleanup 2 (approved mutation)
    runs-on: ubuntu-latest
    environment: production
    env:
      RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      TARGET_SERVICE_IDS: ${{ github.event.inputs.target_service_ids }}
      CONFIRM_SERVICE_IDS: ${{ github.event.inputs.confirm_service_ids }}
      DISABLE_PR_PREVIEWS: ${{ github.event.inputs.disable_pr_previews }}

    steps:
      - uses: actions/checkout@v4

      - name: 0. Fail closed without the environment secret
        run: |
          if [ -z "$RENDER_KEY" ]; then
            echo "::error::RENDER_API_KEY is not configured on the production environment — refusing to run (fail closed, no network calls made)"
            exit 1
          fi
          echo "Credential present (environment-scoped secret). DRY_RUN=$DRY_RUN"

      - name: 1. Resolve production service (by canonical name, fail closed)
        run: |
          curl -s -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50" \
            > /tmp/services.json
          python3 - /tmp/services.json /tmp/svc_id.txt << 'PYEOF'
          import sys, json
          try:
              with open(sys.argv[1]) as f:
                  data = json.load(f)
          except Exception:
              print("Unparseable authenticated response (body suppressed).")
              sys.exit(1)
          ids = [
              (item.get("service", item)).get("id", "")
              for item in data
              if (item.get("service", item)).get("name") == "rico-job-automation-api"
          ]
          if len(ids) != 1 or not ids[0]:
              print("REFUSED: production service 'rico-job-automation-api' not uniquely found — no mutation is possible in this state.")
              sys.exit(1)
          with open(sys.argv[2], "w") as f:
              f.write(ids[0])
          print("Production service ID:", ids[0], "(protected — never a deletion target)")
          PYEOF

      - name: 2. Validate explicit deletion allowlist (guard, auditable preview)
        if: env.TARGET_SERVICE_IDS != ''
        run: |
          python3 scripts/render_cleanup_guard.py /tmp/services.json

      - name: 3. Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "=== DRY RUN — nothing will be mutated ==="
          if [ -n "$TARGET_SERVICE_IDS" ]; then
            echo "Validated deletion targets are listed in step 2."
          else
            echo "No deletion targets supplied."
          fi
          echo "disable_pr_previews=$DISABLE_PR_PREVIEWS (ignored in dry run)"
          echo "Set dry_run=false AND repeat the id list in confirm_service_ids to execute."

      - name: 4. Disable PR preview creation (opt-in, approved)
        if: env.DRY_RUN == 'false' && env.DISABLE_PR_PREVIEWS == 'yes'
        run: |
          SVC_ID=$(cat /tmp/svc_id.txt)
          echo "Disabling PR previews on production service"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $RENDER_KEY" \
            -H "Content-Type: application/json" \
            -d '{"serviceDetails":{"pullRequestPreviewsEnabled":"no"}}' \
            "https://api.render.com/v1/services/$SVC_ID")
          echo "PATCH -> HTTP $HTTP (response body suppressed)"
          if [ "$HTTP" != "200" ]; then
            echo "::error::PATCH failed with HTTP $HTTP"
            exit 1
          fi

      - name: 5. Delete ONLY the validated allowlist (re-validated live)
        if: env.DRY_RUN == 'false' && env.TARGET_SERVICE_IDS != ''
        run: |
          # Re-fetch and RE-VALIDATE immediately before mutating: if the live
          # service set changed since the preview (renames, deletions, new
          # ids), the guard refuses and nothing is deleted.
          curl -s -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50" \
            > /tmp/services_now.json
          python3 scripts/render_cleanup_guard.py /tmp/services_now.json

          python3 - /tmp/services_now.json << 'PYEOF'
          import json, os, sys, urllib.request
          sys.path.insert(0, "scripts")
          from render_cleanup_guard import parse_service_list, validate

          with open(sys.argv[1]) as f:
              services = parse_service_list(json.load(f))
          targets, _ = validate(
              services,
              os.environ.get("TARGET_SERVICE_IDS", ""),
              os.environ.get("CONFIRM_SERVICE_IDS", ""),
          )
          key = os.environ["RENDER_KEY"]
          names = dict(services)
          failures = 0
          for svc_id in targets:
              req = urllib.request.Request(
                  f"https://api.render.com/v1/services/{svc_id}",
                  method="DELETE",
                  headers={"Authorization": f"Bearer {key}"},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      code = resp.status
              except urllib.error.HTTPError as e:
                  code = e.code
              # #1084: status code only — never the response body.
              print(f"DELETE {svc_id} ({names.get(svc_id, '?')}) -> HTTP {code}")
              if code not in (200, 202, 204):
                  failures += 1
          if failures:
              print(f"{failures} deletion(s) did not return success.")
              sys.exit(1)
          PYEOF

      - name: 6. Verify final state (read-only)
        run: |
          echo "=== FINAL SERVICE LIST ==="
          curl -s -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50" \
            > /tmp/services_final.json
          python3 - /tmp/services_final.json << 'PYEOF'
          import sys, json
          try:
              with open(sys.argv[1]) as f:
                  data = json.load(f)
          except Exception:
              print("Unparseable authenticated response (body suppressed).")
              sys.exit(0)
          print("Total services remaining:", len(data))
          for item in data:
              s = item.get("service", item)
              print(" ", s.get("id"), "|", s.get("name"))
          PYEOF
