name: Diagnostic Recent Merge Regressions

on:
  pull_request:

permissions:
  contents: read

jobs:
  recent-merge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run intent subscription and auth regressions
        env:
          REDIS_URL: ""
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"
          JWT_SECRET: "test-secret-ci-only"
          DEEPSEEK_API_KEY: "sk-fake"
          OPENAI_API_KEY: "sk-fake"
          ENVIRONMENT: "test"
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest \
            tests/unit/test_intent_gates.py \
            tests/unit/test_subscription_feature_gating.py \
            tests/unit/test_search_execution_contract_convergence.py \
            tests/test_job_search_action_contract.py \
            tests/test_users_auth.py \
            -q --tb=short
