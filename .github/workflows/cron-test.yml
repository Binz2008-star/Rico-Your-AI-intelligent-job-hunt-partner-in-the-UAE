name: "Manual Cron Double-Fire Test (#644 verification)"

# Dispatch-only. Simulates two consecutive Render Cron runs against
# POST /api/v1/pipeline/reminders (default interval_days=7) and asserts
# status="ok" both times. Never runs automatically.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cron-test:
    name: Render Cron Double-Fire
    runs-on: ubuntu-latest
    steps:
      - name: "Cron run 1 (should return status=ok)"
        env:
          RICO_CRON_SECRET: ${{ secrets.RICO_CRON_SECRET }}
        run: |
          RESPONSE1=$(curl -s -X POST \
            -H "X-Cron-Secret: $RICO_CRON_SECRET" \
            https://rico-job-automation-api.onrender.com/api/v1/pipeline/reminders)
          echo "Cron run 1 response: $RESPONSE1"
          STATUS1=$(echo "$RESPONSE1" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo PARSE_ERROR)
          echo "Cron run 1 status: $STATUS1"
          if [ "$STATUS1" != "ok" ]; then
            echo "ERROR: Cron run 1 returned status=$STATUS1 (expected 'ok')"
            exit 1
          fi
          echo "PASS: Cron run 1 returned status=ok"

      - name: "Cron run 2 (idempotent - should still return status=ok)"
        env:
          RICO_CRON_SECRET: ${{ secrets.RICO_CRON_SECRET }}
        run: |
          RESPONSE2=$(curl -s -X POST \
            -H "X-Cron-Secret: $RICO_CRON_SECRET" \
            https://rico-job-automation-api.onrender.com/api/v1/pipeline/reminders)
          echo "Cron run 2 response: $RESPONSE2"
          STATUS2=$(echo "$RESPONSE2" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo PARSE_ERROR)
          MARKED2=$(echo "$RESPONSE2" | python3 -c "import sys,json; print(json.load(sys.stdin).get('marked_due',-1))" 2>/dev/null || echo PARSE_ERROR)
          echo "Cron run 2 status: $STATUS2"
          echo "Cron run 2 marked_due: $MARKED2"
          if [ "$STATUS2" != "ok" ]; then
            echo "ERROR: Cron run 2 returned status=$STATUS2 (expected 'ok')"
            exit 1
          fi
          echo "PASS: Cron run 2 returned status=ok"
          echo "NOTE: marked_due=$MARKED2 (expecting 0 if no real user jobs are > 7d applied)"
