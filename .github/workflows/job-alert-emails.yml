name: "Job Alert Emails (manual)"

# Personalized job-alert email sweep. Dispatch-only for now — PR-2 ships the
# endpoint and this manual trigger; the daily schedule is enabled in a later PR
# once opt-in volume and deliverability are validated in production.
#
# Sending also requires RICO_ENABLE_EMAIL_ALERTS to be truthy on the backend.
# Run with dry_run=true (default) to validate matching WITHOUT sending.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Evaluate matches without sending or logging"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  # schedule:            # enabled in a later PR (PR-3)
  #   - cron: '0 6 * * *'  # 06:00 UTC daily

permissions:
  contents: read

concurrency:
  group: job-alert-emails
  cancel-in-progress: false

jobs:
  sweep:
    name: Job Alert Email Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger sweep
        env:
          API_URL: ${{ secrets.RICO_API_URL }}
          CRON_SECRET: ${{ secrets.RICO_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::RICO_API_URL and RICO_CRON_SECRET secrets are required."
            exit 1
          fi
          BASE="${API_URL%/}"
          DRY="${DRY_RUN:-true}"
          echo "Triggering job-alert-emails sweep (dry_run=${DRY})"
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            "${BASE}/api/v1/pipeline/job-alert-emails?dry_run=${DRY}")
          echo "HTTP ${HTTP}"
          cat /tmp/resp.json || true
          echo
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Sweep failed with HTTP ${HTTP}"
            exit 1
          fi
