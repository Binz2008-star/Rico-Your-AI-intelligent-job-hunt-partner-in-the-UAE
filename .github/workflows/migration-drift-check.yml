name: Migration Drift Check

# Numbered SQL migrations are applied manually (no deploy-time runner), so prod
# can silently fall behind main. This read-only job checks that each migration's
# signature object exists in production and fails (alerts) if any is missing.
# It never writes to the database.
on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch:

concurrency:
  group: migration-drift-check
  cancel-in-progress: true

jobs:
  drift:
    name: Detect production migration drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Check production migration drift (read-only)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/check_migration_drift.py
