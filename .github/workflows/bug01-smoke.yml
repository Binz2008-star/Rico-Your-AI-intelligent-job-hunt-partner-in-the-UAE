name: "BUG-01 Production Smoke (#648, one-off)"

# Dispatch-only. Verifies /version = 40636ba and that BUG-01 is fixed.
# Delete this file after the smoke passes.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: BUG-01 Smoke
    runs-on: ubuntu-latest
    steps:
      - name: "1. Verify /version = 40636ba"
        run: |
          RESP=$(curl -sf https://rico-job-automation-api.onrender.com/version)
          echo "Raw /version response: $RESP"
          VERSION=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['commit'])")
          echo "Deployed commit: $VERSION"
          if [[ "$VERSION" != "40636ba6ed2fd15cf135ef38030c6e1d2641ecab" ]]; then
            echo "FAIL: Wrong commit. Expected 40636ba6..., got $VERSION"
            exit 1
          fi
          echo "PASS: /version = 40636ba"

      - name: "2. Cover-letter smoke — must NOT return job_results"
        run: |
          RESULT=$(curl -sf -X POST https://rico-job-automation-api.onrender.com/api/v1/rico/chat/public \
            -H "Content-Type: application/json" \
            -d '{"message":"Draft me a cover letter for the HSE MANAGER - DATA CENTERS role at Dutco Group","session_id":"smoke-bug01-cl"}')
          echo "Response: $RESULT"
          TYPE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('type',''))")
          echo "Response type: $TYPE"
          if [[ "$TYPE" == "job_results" ]]; then
            echo "FAIL: Got job_results — BUG-01 still present (routed to company search)"
            exit 1
          fi
          if [[ "$TYPE" == "draft_message" || "$TYPE" == "cover_letter_prompt" ]]; then
            echo "PASS: Cover letter routed correctly (type=$TYPE)"
          else
            echo "WARN: Unexpected type=$TYPE — not job_results but also not draft_message/cover_letter_prompt. Review manually."
          fi

      - name: "3. Company-search regression — must NOT return cover_letter"
        run: |
          RESULT=$(curl -sf -X POST https://rico-job-automation-api.onrender.com/api/v1/rico/chat/public \
            -H "Content-Type: application/json" \
            -d '{"message":"find jobs at Dutco Group","session_id":"smoke-bug01-cs"}')
          echo "Response: $RESULT"
          TYPE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('type',''))")
          echo "Response type: $TYPE"
          if [[ "$TYPE" == "draft_message" || "$TYPE" == "cover_letter_prompt" ]]; then
            echo "FAIL: Got cover_letter response for explicit job search — regression in company search"
            exit 1
          fi
          echo "PASS: Company search not broken (type=$TYPE)"

      - name: "4. Backend health — no errors"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rico-job-automation-api.onrender.com/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /health returned $STATUS"
            exit 1
          fi
          echo "PASS: /health = 200"
