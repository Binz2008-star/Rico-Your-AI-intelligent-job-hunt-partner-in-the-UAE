name: Render Optimization Audit

on:
  workflow_dispatch:
    inputs:
      render_api_key:
        description: 'Render API Key (rnd_...)'
        required: true

jobs:
  audit:
    name: Render Optimization Audit
    runs-on: ubuntu-latest
    env:
      RENDER_KEY: ${{ github.event.inputs.render_api_key }}
      BACKEND_URL: https://rico-job-automation-api.onrender.com

    steps:
      - name: 1. List all services
        run: |
          echo "=== ALL RENDER SERVICES ==="
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(f'Total services: {len(data)}')
for item in data:
    s = item.get('service', item)
    print(f\"  {s.get('id')} | {s.get('name')} | type={s.get('type')} | plan={s.get('plan')} | status={s.get('suspended','active')}\")
"

      - name: 2. Service details — rico-job-automation-api
        id: svc_details
        run: |
          echo "=== SERVICE DETAILS ==="
          SVC_RAW=$(curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50")

          SVC_ID=$(echo "$SVC_RAW" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for item in data:
    s = item.get('service', item)
    if s.get('name') == 'rico-job-automation-api':
        print(s.get('id'))
")
          echo "Service ID: $SVC_ID"
          echo "svc_id=$SVC_ID" >> $GITHUB_OUTPUT

          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services/$SVC_ID" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
s = data.get('service', data)
print('Name:        ', s.get('name'))
print('Type:        ', s.get('type'))
print('Plan:        ', s.get('plan'))
print('Status:      ', 'suspended' if s.get('suspended') else 'active')
print('URL:         ', s.get('serviceDetails', {}).get('url') or s.get('serviceDetails', {}).get('pullRequestPreviewsEnabled',''))
sd = s.get('serviceDetails', {})
print('Service URL: ', sd.get('url', 'N/A'))
print('PR previews: ', sd.get('pullRequestPreviewsEnabled', 'N/A'))
print('Branch:      ', sd.get('branch', 'N/A'))
print('Repo:        ', s.get('repo', {}).get('name', 'N/A') if isinstance(s.get('repo'), dict) else s.get('repo', 'N/A'))
print('Region:      ', s.get('region', 'N/A'))
print('Created:     ', s.get('createdAt', 'N/A'))
print('Updated:     ', s.get('updatedAt', 'N/A'))
"

      - name: 3. Env var keys — presence check (no values logged)
        run: |
          SVC_ID=${{ steps.svc_details.outputs.svc_id }}
          echo "=== ENV VAR KEYS PRESENT ==="
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services/$SVC_ID/env-vars?limit=200" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
keys = sorted(e.get('envVar', e).get('key', '') for e in data)
print(f'Total env vars: {len(keys)}')

# Check critical keys
critical = [
    'DATABASE_URL', 'JWT_SECRET',
    'JOTFORM_WEBHOOK_SECRET', 'JOTFORM_FORM_ID',
    'TELEGRAM_BOT_TOKEN', 'TELEGRAM_CHAT_ID', 'TELEGRAM_WEBHOOK_SECRET',
    'OPENAI_API_KEY', 'DEEPSEEK_API_KEY', 'HF_TOKEN',
    'RAPIDAPI_KEY', 'GITHUB_WEBHOOK_SECRET',
    'COOKIE_SECURE', 'CORS_ORIGINS', 'RESET_BASE_URL',
    'RICO_AI_PROVIDER', 'RICO_ENV',
]
print('')
print('Critical key presence:')
for k in critical:
    status = 'PRESENT' if k in keys else 'MISSING'
    print(f'  {k}: {status}')
print('')
print('All keys:', keys)
"

      - name: 4. Recent deploys (last 5)
        run: |
          SVC_ID=${{ steps.svc_details.outputs.svc_id }}
          echo "=== RECENT DEPLOYS ==="
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services/$SVC_ID/deploys?limit=5" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(f'Last {len(data)} deploys:')
for d in data:
    dep = d.get('deploy', d)
    print(f\"  {dep.get('id','?')} | status={dep.get('status','?')} | trigger={dep.get('trigger',{}).get('type','?') if isinstance(dep.get('trigger'),dict) else dep.get('trigger','?')} | {dep.get('createdAt','?')[:19]}\")
"

      - name: 5. Health check — /health
        run: |
          echo "=== HEALTH CHECK ==="
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 30 "$BACKEND_URL/health")
          echo "HTTP status: $HTTP"
          echo "Response:"
          cat /tmp/health.json | python3 -m json.tool 2>/dev/null || cat /tmp/health.json
          if [ "$HTTP" != "200" ]; then
            echo "WARNING: health check returned $HTTP"
          else
            echo "OK: health endpoint responding"
          fi

      - name: 6. Version check — /version
        run: |
          echo "=== VERSION ==="
          curl -sf --max-time 30 "$BACKEND_URL/version" \
            | python3 -m json.tool 2>/dev/null \
            || echo "version endpoint not responding"

      - name: 7. JotForm webhook route probe (GET — read-only)
        run: |
          echo "=== JOTFORM WEBHOOK ROUTE ==="
          # OPTIONS probe — no payload, confirms route is registered
          HTTP=$(curl -s -o /tmp/jf.json -w "%{http_code}" \
            --max-time 10 \
            -X OPTIONS "$BACKEND_URL/api/v1/rico/webhooks/jotform")
          echo "OPTIONS $BACKEND_URL/api/v1/rico/webhooks/jotform → HTTP $HTTP"
          # 200 or 405 both confirm the route exists; 404 means route missing
          if [ "$HTTP" = "404" ]; then
            echo "ERROR: JotForm webhook route not found"
          else
            echo "OK: route registered (HTTP $HTTP)"
          fi

      - name: 8. Telegram webhook route probe (GET — read-only)
        run: |
          echo "=== TELEGRAM WEBHOOK ROUTE ==="
          HTTP=$(curl -s -o /tmp/tg.json -w "%{http_code}" \
            --max-time 10 \
            -X OPTIONS "$BACKEND_URL/api/v1/rico/webhooks/telegram")
          echo "OPTIONS $BACKEND_URL/api/v1/rico/webhooks/telegram → HTTP $HTTP"
          if [ "$HTTP" = "404" ]; then
            echo "ERROR: Telegram webhook route not found"
          else
            echo "OK: route registered (HTTP $HTTP)"
          fi

      - name: 9. Check available Render service types (cron availability)
        run: |
          echo "=== EXISTING SERVICE TYPES IN ACCOUNT ==="
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=50" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
types = set()
for item in data:
    s = item.get('service', item)
    types.add(s.get('type', 'unknown'))
print('Service types in use:', sorted(types))
print('')
print('Note: Render Cron service type = cron_job')
print('If not in list, no cron jobs exist yet.')
"

      - name: 10. Workspace / owner info
        run: |
          echo "=== WORKSPACE INFO ==="
          curl -sf -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/owners?limit=10" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
for item in data:
    o = item.get('owner', item)
    print(f\"Owner: {o.get('name')} | type={o.get('type')} | email={o.get('email', 'N/A')} | id={o.get('id')}\")
" 2>/dev/null || echo "owners endpoint returned non-JSON or error"

      - name: 11. Summary report
        run: |
          SVC_ID=${{ steps.svc_details.outputs.svc_id }}
          echo ""
          echo "========================================="
          echo "   RENDER OPTIMIZATION AUDIT SUMMARY"
          echo "========================================="
          echo ""
          echo "Production backend: rico-job-automation-api"
          echo "Backend URL: $BACKEND_URL"
          echo "Service ID: $SVC_ID"
          echo ""
          echo "Cleanup status (from previous run):"
          echo "  - 7 PR preview services: DELETED"
          echo "  - eco-pipeline-webhook: DELETED"
          echo "  - PR auto-previews: DISABLED"
          echo ""
          echo "Webhook URLs:"
          echo "  JotForm: $BACKEND_URL/api/v1/rico/webhooks/jotform"
          echo "  Telegram: $BACKEND_URL/api/v1/rico/webhooks/telegram"
          echo "  GitHub: $BACKEND_URL/api/v1/rico/webhooks/github"
          echo ""
          echo "Vercel proxy: https://ricohunt.com/proxy/* → $BACKEND_URL/*"
          echo "/command route: https://ricohunt.com/command → uses proxy for all API calls"
          echo ""
          echo "Expected monthly cost: ~\$7/mo (Starter web service only)"
          echo ""
          echo "Cron readiness: No cron jobs created. Starter plan supports cron services."
          echo "Future cron: follow-up reminders at 7-day intervals is feasible."
          echo ""
          echo "Render.yaml: plan: free → should be updated to plan: starter (PR #462)"
