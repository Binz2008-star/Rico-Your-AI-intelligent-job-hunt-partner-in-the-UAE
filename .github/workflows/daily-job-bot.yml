name: Daily Job Bot Legacy

on:
  schedule:
    - cron: "0 6 * * *" # 6:00 AM UTC
    - cron: "0 15 * * *" # 3:00 PM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  intelligence:
    name: Intelligence Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Gmail OAuth files
        run: |
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run intelligence pipeline
        id: run_daily
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EXCLUDE_KEYWORDS: ${{ secrets.EXCLUDE_KEYWORDS }}
          NG_ENABLED: "false"
          AUTO_APPLY_ENABLED: "false"
          RICO_DEMO_MODE: ${{ secrets.RICO_DEMO_MODE || 'false' }}
          RICO_TELEGRAM_PUBLIC_ALERTS: ${{ secrets.RICO_TELEGRAM_PUBLIC_ALERTS || 'true' }}
        run: python -m src.run_daily

      - name: Notify pipeline failure
        if: failure() && steps.run_daily.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RICO_DEMO_MODE: ${{ secrets.RICO_DEMO_MODE || 'false' }}
          RICO_TELEGRAM_PUBLIC_ALERTS: ${{ secrets.RICO_TELEGRAM_PUBLIC_ALERTS || 'true' }}
        run: |
          python -c "
          import os, requests
          demo_mode = os.getenv('RICO_DEMO_MODE', '').lower() in ('true', '1', 'yes')
          public_alerts = os.getenv('RICO_TELEGRAM_PUBLIC_ALERTS', 'true').lower() in ('true', '1', 'yes')
          if not demo_mode and public_alerts:
              token   = os.getenv('TELEGRAM_BOT_TOKEN', '')
              chat_id = os.getenv('TELEGRAM_CHAT_ID', '')
              if token and chat_id:
                  requests.post(
                      f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat_id,
                            'text': '🔴 Daily pipeline failed — fetch/scoring error. Check GitHub Actions logs.'},
                      timeout=10,
                  )
          else:
              print('Pipeline failure notification suppressed (demo mode or public alerts disabled)')
          "

      - name: Run follow-up reminders
        if: steps.run_daily.outcome == 'success'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m src.follow_up

      - name: Deploy dashboard to GitHub Pages
        if: always()
        run: |
          if [ ! -f dashboard.html ]; then
            echo "dashboard.html not found — skipping deploy"
            exit 0
          fi
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          # Pull latest main BEFORE regenerating/committing: docs/index.html is
          # fully regenerated every run, so committing first and rebasing after
          # guarantees a conflict against any other run's dashboard commit.
          git pull --rebase origin main
          mkdir -p docs
          cp dashboard.html docs/index.html
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update dashboard [skip ci]"
          git push origin main || echo "Dashboard push failed — likely concurrent main update"
