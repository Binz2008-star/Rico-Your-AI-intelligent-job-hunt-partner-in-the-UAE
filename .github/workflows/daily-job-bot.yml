name: Daily Job Bot Legacy

# RETIRED FROM SCHEDULE (#1086): "Daily Job Bot Full" (daily.yml) is the ONE
# canonical scheduled pipeline. This legacy workflow duplicated the same
# 06:00/15:00 UTC crons, ran the same src.run_daily + src.follow_up against
# the same production services with no shared lock, and pushed a regenerated
# dashboard to main even when the pipeline failed. It is kept as a manual
# fallback ONLY (workflow_dispatch) and shares the canonical concurrency
# group so a manual run can never overlap the scheduled pipeline.
#
# Dashboard publication was removed from this workflow entirely — only the
# canonical pipeline publishes, and never to main (see daily.yml).
# Failure alerting is owned by error-notifications.yml (admin/dev channel);
# the old user-chat failure ping violated the notification audience rules.

on:
  workflow_dispatch:

permissions:
  contents: read

# Same lock as daily.yml: queued, never concurrent, never cancelled mid-run.
concurrency:
  group: daily-job-bot
  cancel-in-progress: false

jobs:
  intelligence:
    name: Intelligence Pipeline (manual fallback)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Gmail OAuth files
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p data
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > data/gmail_credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON"       > data/gmail_token.json
          chmod 600 data/gmail_credentials.json data/gmail_token.json

      - name: Run intelligence pipeline
        id: run_daily
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EXCLUDE_KEYWORDS: ${{ secrets.EXCLUDE_KEYWORDS }}
          NG_ENABLED: "false"
          AUTO_APPLY_ENABLED: "false"
          RICO_DEMO_MODE: ${{ secrets.RICO_DEMO_MODE || 'false' }}
          RICO_TELEGRAM_PUBLIC_ALERTS: ${{ secrets.RICO_TELEGRAM_PUBLIC_ALERTS || 'true' }}
        run: python -m src.run_daily

      - name: Run follow-up reminders
        if: steps.run_daily.outcome == 'success'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m src.follow_up

      - name: Clean up Gmail OAuth files
        if: always()
        run: rm -f data/gmail_credentials.json data/gmail_token.json
