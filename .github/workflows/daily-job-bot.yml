name: Daily Job Bot

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  # Job 1: Intelligence Pipeline (GitHub-hosted)
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Write Gmail OAuth files
        run: |
          mkdir -p data
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > data/gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > data/gmail_token.json

      - name: Debug NG env
        run: |
          echo "NG_ENABLED=${NG_ENABLED:-missing}"
          echo "NG_DRY_RUN=${NG_DRY_RUN:-missing}"
          echo "NG_HEADLESS=${NG_HEADLESS:-missing}"
          echo "NG_MAX_PER_RUN=${NG_MAX_PER_RUN:-missing}"
          echo "NG_DAILY_LIMIT=${NG_DAILY_LIMIT:-missing}"
          echo "NG_SCORE_THRESHOLD=${NG_SCORE_THRESHOLD:-missing}"
          echo "NAUKRIGULF_EMAIL=${NAUKRIGULF_EMAIL:-missing}"
          echo "NAUKRIGULF_PASSWORD=${NAUKRIGULF_PASSWORD:-missing}"
          echo "EXCLUDE_KEYWORDS=${EXCLUDE_KEYWORDS:-missing}"

      - name: Run intelligence pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # NaukriGulf disabled for intelligence job
          NG_ENABLED: "false"
          EXCLUDE_KEYWORDS: ${{ secrets.EXCLUDE_KEYWORDS }}
        run: python -m src.run_daily

      - name: Run follow-up reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.follow_up

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-workflow-page@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: dashboard

  # Job 2: Browser Automation (Self-hosted)
  apply:
    runs-on: self-hosted  # Uses your machine for browser automation
    needs: intelligence
    if: ${{ secrets.NG_FORCE_GITHUB_BROWSER == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Write Gmail OAuth files
        run: |
          mkdir -p data
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > data/gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > data/gmail_token.json

      - name: Run NaukriGulf automation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # NaukriGulf enabled for apply job
          NG_ENABLED: "true"
          NG_FORCE_GITHUB_BROWSER: "true"
          NG_DRY_RUN: "false"
          NG_MAX_PER_RUN: "2"
          NG_DAILY_LIMIT: "5"
          NG_SCORE_THRESHOLD: "85"
          NG_HEADLESS: "true"
          NAUKRIGULF_EMAIL: ${{ secrets.NAUKRIGULF_EMAIL }}
          NAUKRIGULF_PASSWORD: ${{ secrets.NAUKRIGULF_PASSWORD }}
          EXCLUDE_KEYWORDS: ${{ secrets.EXCLUDE_KEYWORDS }}
        run: python scripts/run_naukrigulf_apply.py
