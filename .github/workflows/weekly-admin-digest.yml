name: "Weekly Admin Digest"

# Weekly activation digest for the admin inbox (issue #922). The endpoint is
# idempotent per ISO week (admin_digest_log claim before send), so an extra
# manual dispatch or a retried schedule run can never double-send.
#
# Requires migration 036 and the RICO_API_URL / RICO_CRON_SECRET secrets.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute metrics without claiming the week or sending"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '30 6 * * 1'  # Mondays 06:30 UTC — after the profile-nudge/daily sweeps

permissions:
  contents: read

concurrency:
  group: weekly-admin-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Weekly Activation Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger digest
        env:
          API_URL: ${{ secrets.RICO_API_URL }}
          CRON_SECRET: ${{ secrets.RICO_CRON_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::RICO_API_URL and RICO_CRON_SECRET secrets are required."
            exit 1
          fi
          BASE="${API_URL%/}"
          DRY="${DRY_RUN:-false}"
          echo "Triggering weekly admin digest (dry_run=${DRY})"
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            "${BASE}/api/v1/pipeline/admin-digest?dry_run=${DRY}")
          echo "HTTP ${HTTP}"
          cat /tmp/resp.json || true
          echo
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Digest failed with HTTP ${HTTP}"
            exit 1
          fi
