name: QA Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest \
            tests/unit/ \
            tests/test_link_verifier.py \
            tests/test_rico_product_behavior.py \
            tests/test_cv_profile_extraction.py \
            tests/test_rico_routes.py \
            tests/test_security_audit.py \
            tests/test_rico_memory_safety.py \
            tests/test_rico_hardening.py \
            -v --tb=short

  playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd apps/web
          npx playwright test --project=chromium
