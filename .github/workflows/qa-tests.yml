name: QA Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        env:
          # Explicitly unset REDIS_URL so slowapi falls back to memory://
          # instead of attempting a real Redis connection that doesn't exist in CI.
          # Without this, every rate-limited route returns HTTP 500 in tests.
          REDIS_URL: ""
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"
          JWT_SECRET: "test-secret-ci-only"
          DEEPSEEK_API_KEY: "sk-fake"
          OPENAI_API_KEY: "sk-fake"
          ENVIRONMENT: "test"
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest \
            tests/unit/ \
            tests/test_link_verifier.py \
            tests/test_rico_product_behavior.py \
            tests/test_cv_profile_extraction.py \
            tests/test_rico_routes.py \
            tests/test_security_audit.py \
            tests/test_rico_memory_safety.py \
            tests/test_rico_hardening.py \
            tests/test_tc2_target_role_propagation.py \
            tests/test_tc2_tc8_wiring.py \
            tests/test_job_result_integrity.py \
            tests/test_tc8_interview_prep_grounding.py \
            tests/test_user_documents_dedup.py \
            tests/test_908_rc4_prevent_noncv_active_cv.py \
            tests/test_963_onboarding_cv_persistence.py \
            tests/test_paddle_billing.py \
            tests/test_identity_doc_image_bypass.py \
            tests/test_attachment_ocr_pipeline.py \
            tests/test_uploaded_document_durable_context.py \
            tests/test_attachment_analysis_factory.py \
            tests/decision_regression/ \
            -v --tb=short

  # Real-Postgres coverage for the user_documents single-primary invariant
  # (#960, migration 037). The `pytest` job above mocks every cursor/
  # transaction, which cannot reproduce how a real, non-deferrable partial
  # unique index (uq_user_documents_one_primary_per_type) rejects a write
  # mid-transaction, or how pg_advisory_xact_lock actually serializes two
  # concurrent connections. This job runs tests/integration/test_user_documents_postgres.py
  # against a real, disposable postgres service container with migration 037
  # applied. Independent of Neon — no production credentials involved.
  postgres-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rico_test
          POSTGRES_PASSWORD: rico_test
          POSTGRES_DB: rico_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run real-Postgres integration tests (user_documents #960 + cv_upload_artifacts #963)
        env:
          RICO_TEST_DATABASE_URL: "postgresql://rico_test:rico_test@localhost:5432/rico_test"
          JWT_SECRET: "test-secret-ci-only"
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest \
            tests/integration/test_user_documents_postgres.py \
            tests/integration/test_cv_upload_artifacts_postgres.py \
            -v --tb=short

  playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        env:
          # E2E exercises real application pages (e.g. /signals), so run the whole
          # suite in full-site mode. Otherwise the pre-launch teaser gate (ON when
          # NEXT_PUBLIC_SITE_LIVE is unset) redirects app routes to /explainer and
          # the webServer readiness probe on '/' never succeeds. CI-only — this
          # does NOT affect any deployed or production environment.
          NEXT_PUBLIC_SITE_LIVE: "true"
        run: |
          cd apps/web
          npx playwright test --project=chromium

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Build (required)
        run: |
          cd apps/web
          npm run build

      # Vitest is now a required (blocking) gate: the full frontend suite is
      # green and stable (320/0) after the FE test-health work in
      # TASK-20260710-008 (B1–B5). See
      # AI_WORKSPACE/HANDOFFS/2026-07-10-fe-vitest-blocking-gate.md.
      - name: Vitest (required)
        run: |
          cd apps/web
          npm run test
