name: QA Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        env:
          # Explicitly unset REDIS_URL so slowapi falls back to memory://
          # instead of attempting a real Redis connection that doesn't exist in CI.
          # Without this, every rate-limited route returns HTTP 500 in tests.
          REDIS_URL: ""
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"
          JWT_SECRET: "test-secret-ci-only"
          DEEPSEEK_API_KEY: "sk-fake"
          OPENAI_API_KEY: "sk-fake"
          ENVIRONMENT: "test"
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest \
            tests/unit/ \
            tests/test_link_verifier.py \
            tests/test_rico_product_behavior.py \
            tests/test_cv_profile_extraction.py \
            tests/test_rico_routes.py \
            tests/test_security_audit.py \
            tests/test_rico_memory_safety.py \
            tests/test_rico_hardening.py \
            tests/test_multiuser_chat_matrix.py \
            tests/test_tc2_target_role_propagation.py \
            tests/test_tc2_tc8_wiring.py \
            tests/test_tc8_interview_prep_grounding.py \
            -v --tb=short

  playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd apps/web
          npx playwright test --project=chromium
