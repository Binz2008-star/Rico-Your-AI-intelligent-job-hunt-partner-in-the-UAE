name: Error Notifications

on:
  workflow_run:
    workflows: ["Daily Job Bot Full", "Daily Job Bot Legacy", "Deploy to Production", "QA Tests"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      PAGERDUTY_CONFIGURED: ${{ secrets.PAGERDUTY_INTEGRATION_KEY != '' }}
      TELEGRAM_CONFIGURED: ${{ secrets.TELEGRAM_TO != '' && secrets.TELEGRAM_TOKEN != '' }}
      DISCORD_CONFIGURED: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}

    steps:
      - name: Create PagerDuty Incident on Failure
        if: ${{ github.event.workflow_run.conclusion == 'failure' && env.PAGERDUTY_CONFIGURED == 'true' }}
        env:
          PD_ROUTING_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          PD_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          PD_REPO: ${{ github.repository }}
          PD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PD_COMMIT: ${{ github.event.workflow_run.head_sha }}
          PD_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg routing_key "$PD_ROUTING_KEY" \
            --arg dedup_key "github-workflow-${PD_WORKFLOW_NAME}-${PD_REPO}" \
            --arg summary "GitHub workflow failed: ${PD_WORKFLOW_NAME} on ${PD_REPO}" \
            --arg branch "$PD_BRANCH" \
            --arg commit "$PD_COMMIT" \
            --arg run_url "$PD_RUN_URL" \
            '{
              routing_key: $routing_key,
              event_action: "trigger",
              dedup_key: $dedup_key,
              payload: {
                summary: $summary,
                severity: "critical",
                source: "github-actions",
                custom_details: {
                  branch: $branch,
                  commit: $commit,
                  run_url: $run_url
                }
              }
            }')
          curl -s --fail -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Resolve PagerDuty Incident on Success
        if: ${{ github.event.workflow_run.conclusion == 'success' && env.PAGERDUTY_CONFIGURED == 'true' }}
        env:
          PD_ROUTING_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          PD_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          PD_REPO: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            --arg routing_key "$PD_ROUTING_KEY" \
            --arg dedup_key "github-workflow-${PD_WORKFLOW_NAME}-${PD_REPO}" \
            '{
              routing_key: $routing_key,
              event_action: "resolve",
              dedup_key: $dedup_key
            }')
          curl -s --fail -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Send Telegram Alert
        if: ${{ github.event.workflow_run.conclusion == 'failure' && env.TELEGRAM_CONFIGURED == 'true' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 **Workflow Failed!**

            **Workflow:** ${{ github.event.workflow_run.name }}
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run ID:** [View Logs](${{ github.event.workflow_run.html_url }})
            **Commit:** ${{ github.event.workflow_run.head_sha }}

      - name: Send Discord Alert
        if: ${{ github.event.workflow_run.conclusion == 'failure' && env.DISCORD_CONFIGURED == 'true' }}
        uses: appleboy/discord-action@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          message: |
            🚨 **Workflow Failed!**

            **Workflow:** ${{ github.event.workflow_run.name }}
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run:** [View Logs](${{ github.event.workflow_run.html_url }})
            **Commit:** ${{ github.event.workflow_run.head_sha }}
          username: "Rico AI Bot"
          color: "0xFF0000"
