name: Daily Job Bot Full

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC
    - cron: '0 15 * * *'  # 3:00 PM UTC
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run self-hosted apply jobs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Default-deny at the workflow level; jobs that need more escalate explicitly
# (deploy-dashboard needs contents: write to push the dashboard branch).
permissions:
  contents: read

# ONE canonical lock (#1086): the legacy manual-fallback workflow shares this
# exact group, so scheduled and manual pipeline runs queue and never overlap.
concurrency:
  group: daily-job-bot
  cancel-in-progress: false

jobs:
  # ── Job 1: Intelligence — GitHub-hosted ───────────────────────────────────
  intelligence:
    name: Intelligence Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # pipeline only reads; dashboard deploy job handles write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Gmail OAuth files
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p data
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > data/gmail_credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON"       > data/gmail_token.json
          chmod 600 data/gmail_credentials.json data/gmail_token.json

      - name: Run intelligence pipeline
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER:               ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:               ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:                 ${{ secrets.EMAIL_TO }}
          EXCLUDE_KEYWORDS:         ${{ secrets.EXCLUDE_KEYWORDS }}
          RICO_REDIS_URL:           ${{ secrets.RICO_REDIS_URL }}
          NG_ENABLED:               "false"
          RICO_ENABLE_AUTO_APPLY:   "false"
        run: python -m src.run_daily

      - name: Run follow-up reminders
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
        run: python -m src.follow_up

      - name: Clean up Gmail OAuth files
        if: always()
        run: rm -f data/gmail_credentials.json data/gmail_token.json

      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-html
          path: dashboard.html
          retention-days: 1

  # ── Job 2: Dashboard publish — dedicated non-runtime branch (#1086) ────────
  # Generated content NEVER commits to main: a dashboard-only change must not
  # trigger the Render/production deploy workflows or contaminate deployment
  # history. The dashboard is force-pushed as a single deterministic commit to
  # the dedicated `dashboard` branch (point GitHub Pages at that branch,
  # /docs folder — one-time repo setting). Runs ONLY after a successful
  # pipeline, and a failed push fails the job loudly — no `|| echo` swallow.
  deploy-dashboard:
    name: Publish Dashboard
    needs: intelligence
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-html

      - name: Publish to the dashboard branch (never main)
        run: |
          if [ ! -f dashboard.html ]; then
            echo "::error::dashboard.html not found — pipeline succeeded but produced no dashboard"
            exit 1
          fi
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout --orphan dashboard
          git rm -rf --quiet . || true
          mkdir -p docs apps/web
          cp dashboard.html docs/index.html
          # Suppress Vercel deployments for this generated orphan branch. The
          # `web` Vercel project auto-builds every pushed branch, but the
          # dashboard orphan carries no apps/web app tree and errored on every
          # publish. git.deploymentEnabled.dashboard=false (evaluated at
          # ingestion, before Root-Directory validation) makes Vercel skip it;
          # GitHub Pages still serves docs/index.html. See TASK-20260717-005.
          cat > apps/web/vercel.json <<'JSON'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "git": {
              "deploymentEnabled": {
                "dashboard": false
              }
            }
          }
          JSON
          git add docs/index.html apps/web/vercel.json
          git commit -m "Publish dashboard $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force origin dashboard

  # ── Job 3: Apply — self-hosted runner ─────────────────────────────────────
  apply:
    name: NaukriGulf Apply
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true' }}
    runs-on: self-hosted
    needs: intelligence
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Verify NaukriGulf session
        id: session_check
        continue-on-error: true
        run: |
          python -c "
          from pathlib import Path
          import sys
          profile = Path('data/ng_profile')
          if not profile.exists() or not any(profile.iterdir()):
              print('SESSION_MISSING')
              sys.exit(1)
          print('SESSION_OK')
          "

      - name: Run NaukriGulf apply
        if: steps.session_check.outcome == 'success'
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCLUDE_KEYWORDS:    ${{ secrets.EXCLUDE_KEYWORDS }}
          NG_ENABLED:          ${{ secrets.NG_ENABLED || 'false' }}
          NG_DRY_RUN:          ${{ secrets.NG_DRY_RUN || 'false' }}
          NG_HEADLESS:         ${{ secrets.NG_HEADLESS || 'false' }}
          NG_MAX_PER_RUN:      ${{ secrets.NG_MAX_PER_RUN || '1' }}
          NG_DAILY_LIMIT:      ${{ secrets.NG_DAILY_LIMIT || '2' }}
          NG_SCORE_THRESHOLD:  ${{ secrets.NG_SCORE_THRESHOLD || '85' }}
          NG_COOLDOWN_SECONDS: "180"
          NG_SLOW_MO:          "800"
          NG_PROFILE_DIR:      "data/ng_profile"
          CV_PATH:             "data/cv.pdf"
          NG_EXCLUDE_KEYWORDS: ${{ secrets.NG_EXCLUDE_KEYWORDS }}
        run: |
          python -c "
          import logging, json
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s %(levelname)s %(name)s %(message)s'
          )
          from src.naukrigulf_apply import run_naukrigulf_apply
          results = run_naukrigulf_apply(jobs=None, max_applies=1)
          summary = {
              'total':   len(results),
              'success': sum(1 for r in results if r.status.value == 'success'),
              'dry_run': sum(1 for r in results if r.status.value == 'dry_run'),
              'failed':  sum(1 for r in results if r.status.value == 'failed'),
          }
          print('APPLY_SUMMARY:', json.dumps(summary))
          for r in results:
              print(r.status.value, '|', r.title[:60], '|', r.company[:30])
          "

      - name: Notify session missing (admin/dev channel only)
        if: steps.session_check.outcome == 'failure'
        env:
          # Operator alert — route to ADMIN/DEV chat only, never the user chat.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ADMIN_BOT_TOKEN || secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID || secrets.TELEGRAM_DEV_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token   = os.getenv('TELEGRAM_BOT_TOKEN','')
          chat_id = os.getenv('ADMIN_TELEGRAM_CHAT_ID','')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id,
                        'text': '⚠️ NaukriGulf: session missing on self-hosted runner — log in manually then re-run.'},
                  timeout=10,
              )
          else:
              print('admin telegram chat not configured; skipping operator alert (no user fallback)')
          "

  # ── Job 4: Indeed Apply — self-hosted runner ────────────────────────────────
  indeed-apply:
    name: Indeed Apply
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true' }}
    runs-on: self-hosted
    needs: intelligence
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Verify Indeed session
        id: indeed_session_check
        continue-on-error: true
        run: |
          python -c "
          from pathlib import Path
          import sys
          profile = Path('data/ng_profile')
          if not profile.exists() or not any(profile.iterdir()):
              print('SESSION_MISSING')
              sys.exit(1)
          print('SESSION_OK')
          "

      - name: Run Indeed apply
        if: steps.indeed_session_check.outcome == 'success'
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          INDEED_ENABLED:      "true"
          INDEED_SCORE_THRESHOLD: "50"
          INDEED_SKIP_COMPANIES: ${{ secrets.INDEED_SKIP_COMPANIES }}
          INDEED_DAILY_LIMIT:  "2"
          INDEED_COOLDOWN_SECONDS: "180"
          INDEED_HEADLESS:     "false"
          NG_PROFILE_DIR:      "data/ng_profile"
          CV_PATH:             "data/cv.pdf"
        run: |
          python scripts/run_indeed_apply.py --max 1

      - name: Notify Indeed session missing (admin/dev channel only)
        if: steps.indeed_session_check.outcome == 'failure'
        env:
          # Operator alert — route to ADMIN/DEV chat only, never the user chat.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ADMIN_BOT_TOKEN || secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID || secrets.TELEGRAM_DEV_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token   = os.getenv('TELEGRAM_BOT_TOKEN','')
          chat_id = os.getenv('ADMIN_TELEGRAM_CHAT_ID','')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id,
                        'text': '⚠️ Indeed: session missing on self-hosted runner — log in manually then re-run.'},
                  timeout=10,
              )
          else:
              print('admin telegram chat not configured; skipping operator alert (no user fallback)')
          "
