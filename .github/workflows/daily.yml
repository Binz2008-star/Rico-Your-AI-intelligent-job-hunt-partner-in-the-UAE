name: Daily Job Bot Full

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC
    - cron: '0 15 * * *'  # 3:00 PM UTC
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run self-hosted apply jobs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Prevent overlapping scheduled/manual runs
concurrency:
  group: daily-job-bot
  cancel-in-progress: false

jobs:
  # ── Job 1: Intelligence — GitHub-hosted ───────────────────────────────────
  intelligence:
    name: Intelligence Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # pipeline only reads; dashboard deploy job handles write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Gmail OAuth files
        run: |
          mkdir -p data
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > data/gmail_credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}'       > data/gmail_token.json

      - name: Run intelligence pipeline
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER:               ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:               ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:                 ${{ secrets.EMAIL_TO }}
          EXCLUDE_KEYWORDS:         ${{ secrets.EXCLUDE_KEYWORDS }}
          RICO_REDIS_URL:           ${{ secrets.RICO_REDIS_URL }}
          NG_ENABLED:               "false"
          RICO_ENABLE_AUTO_APPLY:   "false"
        run: python -m src.run_daily

      - name: Run follow-up reminders
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
        run: python -m src.follow_up

      - name: Clean up Gmail OAuth files
        if: always()
        run: rm -f data/gmail_credentials.json data/gmail_token.json

      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-html
          path: dashboard.html
          retention-days: 1

  # ── Job 2: Dashboard deploy — separate job with write permission ───────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: intelligence
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-html

      - name: Deploy to GitHub Pages
        run: |
          if [ ! -f dashboard.html ]; then
            echo "dashboard.html not found — skipping deploy"
            exit 0
          fi
          mkdir -p docs
          cp dashboard.html docs/index.html
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update dashboard [skip ci]"
          git pull --rebase origin main
          git push --force-with-lease origin main || echo "Dashboard push failed — likely concurrent main update"

  # ── Job 3: Apply — self-hosted runner ─────────────────────────────────────
  apply:
    name: NaukriGulf Apply
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true' }}
    runs-on: self-hosted
    needs: intelligence
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Verify NaukriGulf session
        id: session_check
        continue-on-error: true
        run: |
          python -c "
          from pathlib import Path
          import sys
          profile = Path('data/ng_profile')
          if not profile.exists() or not any(profile.iterdir()):
              print('SESSION_MISSING')
              sys.exit(1)
          print('SESSION_OK')
          "

      - name: Run NaukriGulf apply
        if: steps.session_check.outcome == 'success'
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCLUDE_KEYWORDS:    ${{ secrets.EXCLUDE_KEYWORDS }}
          NG_ENABLED:          "false"
          NG_DRY_RUN:          "false"
          NG_HEADLESS:         "false"
          NG_MAX_PER_RUN:      "1"
          NG_DAILY_LIMIT:      "2"
          NG_SCORE_THRESHOLD:  "85"
          NG_COOLDOWN_SECONDS: "180"
          NG_SLOW_MO:          "800"
          NG_PROFILE_DIR:      "data/ng_profile"
          CV_PATH:             "data/cv.pdf"
          NG_EXCLUDE_KEYWORDS: ${{ secrets.NG_EXCLUDE_KEYWORDS }}
        run: |
          python -c "
          import logging, json
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s %(levelname)s %(name)s %(message)s'
          )
          from src.naukrigulf_apply import run_naukrigulf_apply
          results = run_naukrigulf_apply(jobs=None, max_applies=1)
          summary = {
              'total':   len(results),
              'success': sum(1 for r in results if r.status.value == 'success'),
              'dry_run': sum(1 for r in results if r.status.value == 'dry_run'),
              'failed':  sum(1 for r in results if r.status.value == 'failed'),
          }
          print('APPLY_SUMMARY:', json.dumps(summary))
          for r in results:
              print(r.status.value, '|', r.title[:60], '|', r.company[:30])
          "

      - name: Notify session missing
        if: steps.session_check.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token   = os.getenv('TELEGRAM_BOT_TOKEN','')
          chat_id = os.getenv('TELEGRAM_CHAT_ID','')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id,
                        'text': '⚠️ NaukriGulf: session missing on self-hosted runner — log in manually then re-run.'},
                  timeout=10,
              )
          "

  # ── Job 4: Indeed Apply — self-hosted runner ────────────────────────────────
  indeed-apply:
    name: Indeed Apply
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true' }}
    runs-on: self-hosted
    needs: intelligence
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Verify Indeed session
        id: indeed_session_check
        continue-on-error: true
        run: |
          python -c "
          from pathlib import Path
          import sys
          profile = Path('data/ng_profile')
          if not profile.exists() or not any(profile.iterdir()):
              print('SESSION_MISSING')
              sys.exit(1)
          print('SESSION_OK')
          "

      - name: Run Indeed apply
        if: steps.indeed_session_check.outcome == 'success'
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          INDEED_ENABLED:      "true"
          INDEED_SCORE_THRESHOLD: "50"
          INDEED_SKIP_COMPANIES: ${{ secrets.INDEED_SKIP_COMPANIES }}
          INDEED_DAILY_LIMIT:  "2"
          INDEED_COOLDOWN_SECONDS: "180"
          INDEED_HEADLESS:     "false"
          NG_PROFILE_DIR:      "data/ng_profile"
          CV_PATH:             "data/cv.pdf"
        run: |
          python scripts/run_indeed_apply.py --max 1

      - name: Notify Indeed session missing
        if: steps.indeed_session_check.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token   = os.getenv('TELEGRAM_BOT_TOKEN','')
          chat_id = os.getenv('TELEGRAM_CHAT_ID','')
          if token and chat_id:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id,
                        'text': '⚠️ Indeed: session missing on self-hosted runner — log in manually then re-run.'},
                  timeout=10,
              )
          "
