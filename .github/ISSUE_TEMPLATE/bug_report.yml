name: Bug report
description: Report something broken in Rico
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Rico issue. Please include only non-sensitive information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: chat, CV upload, job search, applications, frontend, backend, deployment
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Remove secrets, tokens, private emails, phone numbers, and personal documents before posting.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, API keys, tokens, and private personal data from this issue.
          required: true
