name: Feature request
description: Suggest an improvement for Rico
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Rico do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat assistant
        - CV and profile
        - Job search
        - Alerts
        - Admin and operations
        - Frontend
        - Backend
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Add context, links, or screenshots. Do not include secrets or private user data.
